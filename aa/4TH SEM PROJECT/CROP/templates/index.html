<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Crop Prediction System</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,700&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg:     #11100a;
      --card:   #1a1610;
      --border: #2c2214;
      --leaf:   #4a6a22;
      --sprout: #7fb83a;
      --wheat:  #c9a84c;
      --cream:  #f0e8d0;
      --mist:   #cdd8b0;
      --dim:    #6a5c3a;
      --faint:  #3a3020;
    }
    html, body { min-height: 100%; }
    body {
      background-color: var(--bg);
      background-image:
        radial-gradient(ellipse 110% 55% at 50% 0%, #2e3d1420 0%, transparent 60%),
        radial-gradient(ellipse 50% 40% at 100% 100%, #1e2a0810 0%, transparent 55%);
      color: var(--cream);
      font-family: 'DM Mono', monospace;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 3.5rem 1.5rem 5rem;
      position: relative;
    }

    /* navbar */
    .navbar {
      position: absolute;
      top: 1.5rem;
      right: 2rem;
      display: flex;
      gap: 1rem;
      align-items: center;
    }

    .navbar-item {
      font-size: 0.62rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--dim);
    }

    .logout-btn {
      background: linear-gradient(135deg, #c9564a 0%, #d97050 55%, #b85544 100%);
      color: #f0e8d0;
      border: none;
      padding: 0.6rem 1.2rem;
      border-radius: 8px;
      font-family: 'DM Mono', monospace;
      font-size: 0.62rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      cursor: pointer;
      position: relative;
      overflow: hidden;
      transition: transform .15s, box-shadow .2s;
      box-shadow: 0 4px 12px #c9564a40, 0 1px 0 #ffffff10 inset;
    }

    .logout-btn::before {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, #ffffff20 0%, transparent 50%);
    }

    .logout-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 20px #c9564a60;
    }

    .logout-btn:active {
      transform: translateY(0);
    }

    /* header */
    header {
      text-align: center;
      margin-bottom: 2.8rem;
      animation: fadeDown 0.7s ease both;
    }
    .badge {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      background: #1c2c0a;
      border: 1px solid #304a14;
      color: var(--mist);
      font-size: 0.58rem;
      letter-spacing: 0.24em;
      text-transform: uppercase;
      padding: 0.3rem 0.85rem;
      border-radius: 999px;
      margin-bottom: 1.1rem;
    }
    .badge-dot { width: 6px; height: 6px; background: var(--sprout); border-radius: 50%; }
    h1 {
      font-family: 'Playfair Display', serif;
      font-size: clamp(2.1rem, 5vw, 3.5rem);
      font-weight: 900;
      line-height: 1.08;
      letter-spacing: -0.02em;
    }
    h1 em { font-style: italic; color: var(--sprout); }
    .subtitle {
      margin-top: 0.7rem;
      color: var(--dim);
      font-size: 0.65rem;
      letter-spacing: 0.14em;
      text-transform: uppercase;
    }

    /* card */
    .card {
      width: 100%;
      max-width: 610px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 22px;
      padding: 2.5rem 2.5rem 2.8rem;
      box-shadow: 0 40px 80px #00000099, 0 0 0 1px #ffffff04 inset;
      animation: fadeUp 0.85s ease both 0.1s;
    }

    /* section labels */
    .slabel {
      font-size: 0.56rem;
      letter-spacing: 0.26em;
      text-transform: uppercase;
      color: var(--wheat);
      margin-bottom: 0.95rem;
      display: flex;
      align-items: center;
      gap: 0.6rem;
    }
    .slabel::before { content: "◆"; font-size: 0.42rem; color: var(--sprout); }
    .slabel::after { content: ""; flex: 1; height: 1px; background: linear-gradient(to right, #3a2e1440, transparent); }

    .grid-3 { display: grid; grid-template-columns: repeat(3,1fr); gap: 0.8rem; margin-bottom: 1.7rem; }
    .grid-2 { display: grid; grid-template-columns: repeat(2,1fr); gap: 0.8rem; margin-bottom: 1.7rem; }

    .field { display: flex; flex-direction: column; gap: 0.36rem; }
    label { font-size: 0.56rem; letter-spacing: 0.16em; text-transform: uppercase; color: #6e5e3e; }

    .iw { position: relative; display: flex; align-items: center; }
    .unit {
      position: absolute; right: 0.72rem;
      font-size: 0.55rem; color: #3e3220;
      pointer-events: none; letter-spacing: 0.05em;
    }
    input[type="text"] {
      width: 100%;
      background: #0d0b06;
      border: 1px solid #261c0c;
      border-radius: 10px;
      padding: 0.7rem 2.2rem 0.7rem 0.82rem;
      font-family: 'DM Mono', monospace;
      font-size: 0.86rem;
      color: var(--cream);
      outline: none;
      transition: border-color .2s, box-shadow .2s, background .2s;
    }
    input::placeholder { color: #2a1e0e; }
    input:focus {
      border-color: var(--sprout);
      background: #111006;
      box-shadow: 0 0 0 3px #7fb83a18;
    }
    input:not(:placeholder-shown):not(:focus) { border-color: #362a14; }

    /* submit */
    button[type="submit"] {
      width: 100%;
      margin-top: 0.3rem;
      padding: 0.95rem 1.5rem;
      font-family: 'DM Mono', monospace;
      font-size: 0.7rem;
      font-weight: 500;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: #0d1a04;
      background: linear-gradient(135deg, #90ca3e 0%, #aee042 55%, #7fb83a 100%);
      border: none;
      border-radius: 12px;
      cursor: pointer;
      position: relative;
      overflow: hidden;
      transition: transform .15s, box-shadow .2s;
      box-shadow: 0 6px 22px #7fb83a26, 0 1px 0 #ffffff20 inset;
    }
    button[type="submit"]::before {
      content: "";
      position: absolute; inset: 0;
      background: linear-gradient(135deg, #ffffff26 0%, transparent 50%);
    }
    button[type="submit"]:hover { transform: translateY(-2px); box-shadow: 0 10px 30px #7fb83a3c; }
    button[type="submit"]:active { transform: translateY(0); }
    .bi { position: relative; display: flex; align-items: center; justify-content: center; gap: 0.5rem; }
    .arr { font-size: 1rem; transition: transform .2s; }
    button[type="submit"]:hover .arr { transform: translateX(3px); }

    .footnote {
      margin-top: 1.5rem;
      font-size: 0.55rem;
      color: var(--faint);
      letter-spacing: 0.1em;
      text-align: center;
      animation: fadeUp 1s ease both .4s;
    }

    .deco { position: fixed; bottom: -6rem; right: -5rem; font-size: 26rem; opacity: 0.025; pointer-events: none; user-select: none; line-height:1; }

    @keyframes fadeDown { from { opacity:0; transform:translateY(-14px); } to { opacity:1; transform:translateY(0); } }
    @keyframes fadeUp   { from { opacity:0; transform:translateY(18px);  } to { opacity:1; transform:translateY(0); } }

    @media (max-width: 480px) {
      .grid-3 { grid-template-columns: 1fr 1fr; }
      .card { padding: 1.7rem 1.2rem 2.1rem; }
      .navbar {
        position: static;
        margin-bottom: 2rem;
        flex-direction: column;
        gap: 0.5rem;
      }
    }
  </style>
</head>
<body>

<div class="deco" aria-hidden="true">🌿</div>

<div class="navbar">
  <span class="navbar-item">Welcome, User</span>
  <form action="/logout" method="post" style="margin: 0;">
    <button type="submit" class="logout-btn">🚪 Logout</button>
  </form>
</div>

<header>
  <div class="badge"><span class="badge-dot"></span> AI-Powered Agriculture</div>
  <h1>Crop <em>Prediction</em><br>System</h1>
  <p class="subtitle">Enter soil &amp; climate parameters below</p>
</header>

<div class="card">
  <form action="/predict" method="post">

    <div class="slabel">Soil Nutrients</div>
    <div class="grid-3">
      <div class="field">
        <label for="N">Nitrogen</label>
        <div class="iw">
          <input type="text" id="N" name="N" placeholder="e.g. 90" required>
          <span class="unit">N</span>
        </div>
      </div>
      <div class="field">
        <label for="P">Phosphorus</label>
        <div class="iw">
          <input type="text" id="P" name="P" placeholder="e.g. 42" required>
          <span class="unit">P</span>
        </div>
      </div>
      <div class="field">
        <label for="K">Potassium</label>
        <div class="iw">
          <input type="text" id="K" name="K" placeholder="e.g. 43" required>
          <span class="unit">K</span>
        </div>
      </div>
    </div>

    <div class="slabel">Climate Conditions</div>
    <div class="grid-2">
      <div class="field">
        <label for="temperature">Temperature</label>
        <div class="iw">
          <input type="text" id="temperature" name="temperature" placeholder="e.g. 22.5" required>
          <span class="unit">°C</span>
        </div>
      </div>
      <div class="field">
        <label for="humidity">Humidity</label>
        <div class="iw">
          <input type="text" id="humidity" name="humidity" placeholder="e.g. 82" required>
          <span class="unit">%</span>
        </div>
      </div>
    </div>

    <div class="slabel">Soil Properties</div>
    <div class="grid-2" style="margin-bottom:2rem;">
      <div class="field">
        <label for="ph">pH Level</label>
        <div class="iw">
          <input type="text" id="ph" name="ph" placeholder="e.g. 6.5" required>
          <span class="unit">pH</span>
        </div>
      </div>
      <div class="field">
        <label for="rainfall">Rainfall</label>
        <div class="iw">
          <input type="text" id="rainfall" name="rainfall" placeholder="e.g. 200" required>
          <span class="unit">mm</span>
        </div>
      </div>
    </div>

    <button type="submit">
      <span class="bi">Predict Best Crop <span class="arr">→</span></span>
    </button>

  </form>
</div>

<p class="footnote">Model trained on agricultural data · Results are advisory only</p>

</body>
</html>
