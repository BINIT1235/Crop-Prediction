<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login | Crop Prediction System</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,700&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:     #11100a;
      --card:   #1a1610;
      --border: #2c2214;
      --leaf:   #4a6a22;
      --sprout: #7fb83a;
      --wheat:  #c9a84c;
      --cream:  #f0e8d0;
      --mist:   #cdd8b0;
      --dim:    #6a5c3a;
      --faint:  #3a3020;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { min-height: 100%; }
    body {
      background: var(--bg);
      background-image:
        radial-gradient(ellipse 110% 55% at 50% 0%, #2e3d1420 0%, transparent 60%),
        radial-gradient(ellipse 50% 40% at 100% 100%, #1e2a0810 0%, transparent 55%);
      color: var(--cream);
      font-family: 'DM Mono', monospace;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2.5rem 1.5rem 4rem;
      min-height: 100vh;
      position: relative;
    }

    .deco {
      position: fixed;
      bottom: -7rem;
      right: -5rem;
      font-size: 26rem;
      opacity: 0.03;
      pointer-events: none;
      user-select: none;
      line-height:1;
    }
    
    .admin-toggle {
      position: absolute;
      top: 2rem;
      right: 2rem;
      background: #1c2c0a;
      border: 1px solid #304a14;
      padding: 0.4rem 0.8rem;
      border-radius: 20px;
      font-size: 0.55rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--sprout);
      cursor: pointer;
      transition: all 0.3s ease;
    }
    
    .admin-toggle:hover {
      background: var(--sprout);
      color: #0d1a04;
      border-color: var(--sprout);
    }
    
    header {
      text-align: center;
      margin-bottom: 2.4rem;
      animation: fadeDown 0.7s ease both;
    }
    .badge {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      background: #1c2c0a;
      border: 1px solid #304a14;
      color: var(--mist);
      font-size: 0.58rem;
      letter-spacing: 0.24em;
      text-transform: uppercase;
      padding: 0.3rem 0.85rem;
      border-radius: 999px;
      margin-bottom: 1.1rem;
    }
    .badge-dot {
      width: 6px; height: 6px;
      background: var(--sprout);
      border-radius: 50%;
    }
    h1 {
      font-family: 'Playfair Display', serif;
      font-size: clamp(2.1rem, 5vw, 3.5rem);
      font-weight: 900;
      line-height: 1.08;
      letter-spacing: -0.02em;
    }
    h1 em {
      font-style: italic;
      color: var(--sprout);
    }
    .subtitle {
      margin-top: 0.7rem;
      color: var(--dim);
      font-size: 0.65rem;
      letter-spacing: 0.14em;
      text-transform: uppercase;
    }
    .card {
      width: 100%;
      max-width: 410px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 22px;
      padding: 2.4rem 2.1rem 2.5rem;
      box-shadow: 0 40px 80px #00000099, 0 0 0 1px #ffffff04 inset;
      animation: fadeUp 0.85s ease both 0.1s;
    }
    .slabel {
      font-size: 0.56rem;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--wheat);
      margin-bottom: 1rem;
      display: flex;
      align-items: center;
      gap: 0.6rem;
    }
    .slabel::before { content: "◆"; font-size: 0.42rem; color: var(--sprout); }
    .slabel::after { content: ""; flex: 1; height: 1px; background: linear-gradient(to right, #3a2e1440, transparent); }
    .field {
      display: flex;
      flex-direction: column;
      gap: 0.36rem;
      margin-bottom: 1.3rem;
    }
    label {
      font-size: 0.56rem;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: #6e5e3e;
    }
    .iw { position: relative; display: flex; align-items: center; }
    input[type="text"], input[type="password"] {
      width: 100%;
      background: #0d0b06;
      border: 1px solid #261c0c;
      border-radius: 10px;
      padding: 0.74rem 0.81rem 0.74rem 0.81rem;
      font-family: 'DM Mono', monospace;
      font-size: 0.89rem;
      color: var(--cream);
      outline: none;
      transition: border-color .2s, box-shadow .2s, background .2s;
    }
    input::placeholder { color: #2a1e0e; }
    input:focus {
      border-color: var(--sprout);
      background: #111006;
      box-shadow: 0 0 0 3px #7fb83a18;
    }
    input:not(:placeholder-shown):not(:focus) { border-color: #362a14; }
    .extras {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 1.2rem;
    }
    .link {
      color: var(--sprout);
      font-size: 0.62rem;
      text-decoration: none;
      letter-spacing: 0.03em;
      transition: color .2s;
    }
    .link:hover { color: var(--wheat); }
    button[type="submit"] {
      width: 100%;
      padding: 0.92rem 1.5rem;
      font-family: 'DM Mono', monospace;
      font-size: 0.7rem;
      font-weight: 500;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: #0d1a04;
      background: linear-gradient(135deg, #90ca3e 0%, #aee042 55%, #7fb83a 100%);
      border: none;
      border-radius: 12px;
      cursor: pointer;
      position: relative;
      overflow: hidden;
      transition: transform .15s, box-shadow .2s;
      box-shadow: 0 6px 22px #7fb83a26, 0 1px 0 #ffffff20 inset;
      margin-top: 0.5rem;
    }
    button[type="submit"]::before {
      content: "";
      position: absolute; inset: 0;
      background: linear-gradient(135deg, #ffffff26 0%, transparent 50%);
    }
    button[type="submit"]:hover { transform: translateY(-2px); box-shadow: 0 10px 30px #7fb83a3c; }
    button[type="submit"]:active { transform: translateY(0); }
    .bi { display: flex; align-items: center; justify-content: center; gap: 0.5rem; }
    .arr { font-size: 1.15rem; transition: transform .2s; }
    button[type="submit"]:hover .arr { transform: translateX(3px); }
    .footnote {
      margin-top: 1.5rem;
      font-size: 0.55rem;
      color: var(--faint);
      letter-spacing: 0.1em;
      text-align: center;
      animation: fadeUp 1s ease both .4s;
    }
    .signup {
      margin-top: 1.2rem;
      text-align: center;
      font-size: 0.59rem;
      color: var(--dim);
    }
    .signup a {
      color: var(--sprout);
      text-decoration: none;
      transition: color .2s;
    }
    .signup a:hover { color: var(--wheat); }
    @keyframes fadeDown { from { opacity:0; transform:translateY(-14px); } to { opacity:1; transform:translateY(0); } }
    @keyframes fadeUp   { from { opacity:0; transform:translateY(18px);  } to { opacity:1; transform:translateY(0); } }
    @media (max-width: 480px) {
      .card { padding: 1.7rem 1.2rem 2.1rem; }
      .admin-toggle {
        position: static;
        margin-bottom: 1rem;
      }
    }
  </style>
</head>
<body>

<div class="deco" aria-hidden="true">🌿</div>

<button class="admin-toggle" onclick="window.location.href='/admin-login'">🔐 Admin Login</button>

<header>
  <div class="badge"><span class="badge-dot"></span> AI-Powered Agriculture</div>
  <h1>Crop <em>Prediction</em></h1>
  <p class="subtitle">Sign in to your account</p>
</header>

<div class="card">
  <form action="/login" method="post" autocomplete="off">
    <div class="slabel">Member Login</div>
    <div class="field">
      <label for="username">Username</label>
      <div class="iw">
        <input type="text" id="username" name="username" placeholder="Enter your username" autocomplete="username" required>
      </div>
    </div>
    <div class="field">
      <label for="password">Password</label>
      <div class="iw">
        <input type="password" id="password" name="password" placeholder="Enter your password" autocomplete="current-password" required>
      </div>
    </div>
    <div class="extras">
      <div>
        <input type="checkbox" id="remember" name="remember" style="accent-color: var(--sprout);margin-right:.33em;">
        <label for="remember" style="color:var(--dim); font-size:0.55rem;">Keep me signed in</label>
      </div>
      <a href="#" class="link">Forgot password?</a>
    </div>
    <button type="submit"><span class="bi">Sign In <span class="arr">→</span></span></button>
  </form>
  <p class="signup">Don't have an account? <a href="/signup">Create one</a></p>
</div>

<p class="footnote">Secure access · Only registered users</p>

</body>
</html>
